# Red Dog Application Chart - Default Values
# These are shared defaults for all environments.
# Override per-environment values in values/values-{env}.yaml.

global:
  namespace: reddog

# Dapr Configuration
dapr:
  enabled: true
  configuration:
    name: reddog.configuration
    tracing:
      samplingRate: "0.05"
    features:
      appHealthCheck: true

  # State Store (environment must supply type + metadata)
  stateStore:
    type: redis

  # Secret Store (environment-specific: override type + metadata)
  secretStore:
    type: kubernetes
    metadata:
      - name: namespace
        value: reddog

  # Pub/Sub (environment must supply type + metadata)
  pubsub:
    type: redis

  # Config Store (application business configuration — ADR-0004)
  configStore:
    type: redis

# Ingress (environment-specific: override annotations + hosts with paths)
ingress:
  enabled: true
  className: nginx
  tls:
    enabled: false
  annotations: {}
  hosts: []

# Common service settings
services:
  common:
    image:
      pullPolicy: Always
      tag: latest
      pullSecrets:
        - name: ghcr-cred
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    dapr:
      logLevel: info
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi

  # OrderService
  orderservice:
    enabled: true
    replicas: 1
    image:
      repository: ghcr.io/ahmedmuhi/reddog-orderservice
    dapr:
      appId: order-service
      appPort: 80

  # MakeLineService
  makelineservice:
    enabled: true
    replicas: 1
    image:
      repository: ghcr.io/ahmedmuhi/reddog-makelineservice
    dapr:
      appId: make-line-service
      appPort: 80

  # LoyaltyService
  loyaltyservice:
    enabled: true
    replicas: 1
    image:
      repository: ghcr.io/ahmedmuhi/reddog-loyaltyservice
    dapr:
      appId: loyalty-service
      appPort: 80

  # AccountingService
  accountingservice:
    enabled: true
    replicas: 1
    image:
      repository: ghcr.io/ahmedmuhi/reddog-accountingservice
    dapr:
      appId: accounting-service
      appPort: 80

  # ReceiptGenerationService
  receiptgenerationservice:
    enabled: true
    replicas: 1
    image:
      repository: ghcr.io/ahmedmuhi/reddog-receiptgenerationservice
    dapr:
      appId: receipt-generation-service
      appPort: 80
    binding:
      enabled: true
      metadata:
        - name: rootPath
          value: /tmp/receipts

  # VirtualCustomers (load generator)
  virtualcustomers:
    enabled: true
    replicas: 1
    image:
      repository: ghcr.io/ahmedmuhi/reddog-virtualcustomers
    dapr:
      appId: virtual-customers
    env:
      VirtualCustomers__NumOrders: -1
      VirtualCustomers__DisableDaprCalls: false
      VirtualCustomers__OrderServiceAppId: order-service

  # VirtualWorker (order completion simulator)
  virtualworker:
    enabled: true
    replicas: 1
    image:
      repository: ghcr.io/ahmedmuhi/reddog-virtualworker
    dapr:
      appId: virtual-worker
      appPort: 80
    binding:
      metadata:
        - name: schedule
          value: "@every 5s"

  # UI (Vue.js frontend)
  ui:
    enabled: true
    replicas: 1
    image:
      repository: ghcr.io/ahmedmuhi/reddog-ui
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    env:
      VITE_MAKELINE_BASE_URL: ""
      VITE_ACCOUNTING_BASE_URL: ""

# Config Seeder (seeds business config keys into Redis for Dapr Config API)
configSeeder:
  enabled: true
  image:
    repository: redis
    tag: 7.2-alpine
    pullPolicy: IfNotPresent
  redisHost: redis-master.reddog.svc.cluster.local
  redisPort: 6379
  virtualCustomers:
    storeId: Redmond
    maxItemQuantity: 4
    maxUniqueItemsPerOrder: 3
    minSecondsToPlaceOrder: 1
    maxSecondsToPlaceOrder: 3
    minSecondsBetweenOrders: 1
    maxSecondsBetweenOrders: 3

# Bootstrapper (database initialization via EF migrations)
bootstrapper:
  enabled: true
  image:
    repository: ghcr.io/ahmedmuhi/reddog-bootstrapper
  dapr:
    appId: bootstrapper
    appPort: 80
    httpPort: 3500
    grpcPort: 50001
  jobAnnotations: {}

# Observability (optional)
observability:
  jaeger:
    enabled: false
  prometheus:
    enabled: false
  grafana:
    enabled: false
