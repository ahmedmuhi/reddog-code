{{- if and .Values.dapr.secretStore (eq .Values.dapr.secretStore.type "kubernetes") }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-reader
  namespace: {{ .Values.global.namespace }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: default-secret-reader
  namespace: {{ .Values.global.namespace }}
subjects:
  - kind: ServiceAccount
    name: default
    namespace: {{ .Values.global.namespace }}
roleRef:
  kind: Role
  name: secret-reader
  apiGroup: rbac.authorization.k8s.io
{{- end }}
